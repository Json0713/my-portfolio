<!DOCTYPE html>
<html lang="en" class="js-loading">
<head>
  <meta charset="UTF-8">

  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = savedTheme || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Jason B. - Frontend developer portfolio showcasing projects, skills, and contact info">
  <meta name="keywords" content="developer, portfolio, JavaScript, HTML, CSS, Angular, GitHub, frontend">
  <meta property="og:title" content="Jason B. | Developer Portfolio">
  <meta property="og:description" content="Explore the portfolio of Jason B., Software | Frontend Developer building web solutions.">
  <meta property="og:image" content="https://my-portfolio-web-j13.vercel.app/assets/images/portfolio-landscape-link-meta-view.jpg">
  <meta name="theme-color" content="#1a3a3f">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://my-portfolio-web-j13.vercel.app">
  <link rel="canonical" href="https://my-portfolio-web-j13.vercel.app">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Jason O. Bayaga",
    "url": "https://my-portfolio-web-j13.vercel.app",
    "jobTitle": "Frontend Developer",
    "description": "Software & Frontend Developer specializing in web architecture",
    "sameAs": [
      "https://github.com/Json0713"
    ]
  }
  </script>

  <!-- Favicon Icons -->
  <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">

  <link rel="shortcut icon" href="favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="MyPortfolio">

  <title>Jason B. | Developer Portfolio</title>

  <!-- Google Fonts (preloaded for performance) -->

  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" as="style">

</head>
<body>

      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-accent fw-bold fs-4" href="#hero">Jason</a>

        <!-- Theme Toggle Switch -->
        <div class="theme-switch d-flex align-items-center gap-2">
          <label class="switch" aria-label="Toggle dark/light theme">
