<!DOCTYPE html>
<html lang="en" class="js-loading">
<head>
  <meta charset="UTF-8">

  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = savedTheme || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Jason B. - Frontend developer portfolio showcasing projects, skills, and contact info">
  <meta name="keywords" content="developer, portfolio, JavaScript, HTML, CSS, Angular, GitHub, frontend">
  <meta property="og:title" content="Jason B. | Developer Portfolio">
  <meta property="og:description" content="Explore the portfolio of Jason B., Software | Frontend Developer building web solutions.">
  <meta property="og:image" content="https://my-portfolio-web-j13.vercel.app/assets/images/portfolio-landscape-link-meta-view.jpg">
  <meta name="theme-color" content="#1a3a3f">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://my-portfolio-web-j13.vercel.app">
  <link rel="canonical" href="https://my-portfolio-web-j13.vercel.app">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Jason O. Bayaga",
    "url": "https://my-portfolio-web-j13.vercel.app",
    "jobTitle": "Frontend Developer",
    "description": "Software & Frontend Developer specializing in web architecture",
    "sameAs": [
      "https://github.com/Json0713"
    ]
  }
  </script>

  <!-- Favicon Icons -->
  <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
  <link rel="shortcut icon" href="favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="MyPortfolio">

  <title>Jason B. | Developer Portfolio</title>

  <!-- Google Fonts (preloaded for performance) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div class="cyber-background"></div>

  <div class="header-wrapper" id="header-wrapper">
    <header class="site-header py-2 border-bottom" id="site-header">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-accent fw-bold fs-4" href="#hero">Jason</a>

        <!-- Header Controls -->
        <div class="d-flex align-items-center gap-3">
          <!-- Theme Toggle Switch -->
          <div class="theme-switch d-flex align-items-center gap-2">
            <label class="switch" aria-label="Toggle dark/light theme">
              <input type="checkbox" id="theme-toggle">
              <span class="slider round">
                <i class="bi bi-moon-fill icon-moon"></i>
                <i class="bi bi-sun-fill icon-sun"></i>
              </span>
            </label>
          </div>

          <!-- Customizer Trigger -->
          <button class="btn btn-link text-accent p-0 customizer-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#customizerPanel" aria-controls="customizerPanel" aria-label="Customize Site">
            <i class="bi bi-sliders fs-4"></i>
          </button>
        </div>
      </div>
    </header>

    <nav class="main-nav py-2 border-bottom overflow-auto" role="navigation" aria-label="Main navigation">
      <div class="container d-flex justify-content-start justify-content-md-center flex-nowrap gap-3">
        <a class="btn btn-outline-light flex-shrink-0" href="#hero" aria-label="Navigate to Home section">Home</a>
        <a class="btn btn-outline-light flex-shrink-0" href="#about" aria-label="Navigate to About section">About</a>
        <a class="btn btn-outline-light flex-shrink-0" href="#projects" aria-label="Navigate to Projects section">Projects</a>
        <a class="btn btn-outline-light flex-shrink-0" href="#contact" aria-label="Navigate to Contact section">Contact</a>
        <a class="btn btn-outline-light flex-shrink-0" href="#resume" aria-label="Navigate to Resume section">Resume</a>
      </div>
    </nav>
  </div>

  <main id="app" role="main"></main>

  <footer class="site-footer text-center py-4 border-top">
    <div class="container">
      <p class="mb-1">&copy; <span id="footer-year">2025</span> Jason B. My Portfolio</p>
      <small class="d-block">All rights reserved.</small>
    </div>
  </footer>

  <!-- Site Customizer Offcanvas -->
  <div class="offcanvas offcanvas-end customizer-panel" tabindex="-1" id="customizerPanel" aria-labelledby="customizerPanelLabel" data-bs-backdrop="false">
    <div class="offcanvas-header border-bottom border-secondary border-opacity-25">
      <h5 class="offcanvas-title text-accent fw-bold" id="customizerPanelLabel"><i class="bi bi-sliders me-2"></i>Customize Site</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
      <!-- Accent Colors -->
      <div class="mb-4">
        <h6 class="text-theme fw-bold mb-3">Accent Colors</h6>
        
        <p class="text-theme mb-2 small fw-semibold">Dark Mode</p>
        <div class="d-flex flex-wrap gap-2 mb-3" id="colorPickerOptionsDark">
          <button class="color-swatch color-dark active" data-color="#00ffc3" data-rgb="0, 255, 195" style="background-color: #00ffc3;" aria-label="Cyan"></button>
          <button class="color-swatch color-dark" data-color="#b026ff" data-rgb="176, 38, 255" style="background-color: #b026ff;" aria-label="Purple"></button>
          <button class="color-swatch color-dark" data-color="#26ff71" data-rgb="38, 255, 113" style="background-color: #26ff71;" aria-label="Emerald"></button>
          <button class="color-swatch color-dark" data-color="#ff7f26" data-rgb="255, 127, 38" style="background-color: #ff7f26;" aria-label="Orange"></button>
          <button class="color-swatch color-dark" data-color="#ff265c" data-rgb="255, 38, 92" style="background-color: #ff265c;" aria-label="Rose"></button>
        </div>

        <p class="text-theme mb-2 small fw-semibold">Light Mode</p>
        <div class="d-flex flex-wrap gap-2" id="colorPickerOptionsLight">
          <button class="color-swatch color-light active" data-color="#004d40" data-rgb="0, 77, 64" style="background-color: #004d40;" aria-label="Teal"></button>
          <button class="color-swatch color-light" data-color="#6200ea" data-rgb="98, 0, 234" style="background-color: #6200ea;" aria-label="Deep Purple"></button>
          <button class="color-swatch color-light" data-color="#00838f" data-rgb="0, 131, 143" style="background-color: #00838f;" aria-label="Blue"></button>
          <button class="color-swatch color-light" data-color="#e65100" data-rgb="230, 81, 0" style="background-color: #e65100;" aria-label="Burnt Orange"></button>
          <button class="color-swatch color-light" data-color="#b71c1c" data-rgb="183, 28, 28" style="background-color: #b71c1c;" aria-label="Dark Red"></button>
        </div>
      </div>

      <hr class="border-secondary border-opacity-25 my-4">

      <!-- Appearance -->
      <div class="mb-4">
        <h6 class="text-theme fw-bold mb-3">Appearance</h6>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" role="switch" id="reduceMotionToggle">
          <label class="form-check-label text-theme" for="reduceMotionToggle">Remove motion</label>
        </div>
        <div class="mb-3">
          <label for="bgStyleSelect" class="form-label text-theme small fw-semibold">Background Style</label>
          <select class="form-select bg-dark text-light border-secondary" id="bgStyleSelect">
            <option value="cyber">Cyber Hexagons</option>
            <option value="grid">Data Grid</option>
            <option value="aurora">Aurora Glow</option>
            <option value="none">None</option>
          </select>
        </div>
      </div>
      
      <div class="mt-auto pt-4 text-center">
        <button class="btn btn-outline-light w-100" id="resetSettingsBtn"><i class="bi bi-arrow-counterclockwise me-2"></i>Reset to Default</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
