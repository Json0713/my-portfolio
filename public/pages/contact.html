<!-- TODO: Replace YOUR_FORM_ID with your Formspree form ID -->
<!-- Get a free form at https://formspree.io -->
<section id="contact" class="page-section py-5">
  <div class="container" style="max-width: 720px;">
    <div class="text-center mb-5 animate-slide-down" style="transition-delay: 0.15s">
      <h1 class="display-5 fw-bold text-accent">Get in Touch</h1>
      <p class="lead text-theme">Have a question or want to work together? Drop me a message.</p>
    </div>

    <div class="row g-5">
      <div class="col-md-7 animate-slide-left" style="transition-delay: 0.3s">
        <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">
          <div class="mb-3">
            <label for="contact-name" class="form-label fw-semibold">Name</label>
            <input type="text" class="form-control" id="contact-name" name="name" placeholder="Your name" required>
          </div>
          <div class="mb-3">
            <label for="contact-email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="contact-email" name="email" placeholder="your.email@example.com" required>
          </div>
          <div class="mb-3">
            <label for="contact-message" class="form-label fw-semibold">Message</label>
            <textarea class="form-control" id="contact-message" name="message" rows="5" placeholder="Tell me about your project or just say hello..." required></textarea>
          </div>
          <button type="submit" id="contact-submit" class="btn btn-accent w-100 fw-bold">
            <i class="bi bi-send me-2"></i>Send Message
          </button>
          <div id="contact-status" class="mt-3 text-center" aria-live="polite"></div>
        </form>
      </div>
      <div class="col-md-5 animate-slide-right" style="transition-delay: 0.45s">
        <h2 class="h5 fw-bold text-accent mb-4">Connect With Me</h2>
        <div class="d-flex flex-column gap-3">
          <a href="https://github.com/Json0713" target="_blank" rel="noopener noreferrer" class="contact-link d-flex align-items-center gap-3 p-3 rounded-3 text-decoration-none">
            <i class="bi bi-github fs-4 text-accent"></i>
            <div>
              <span class="fw-semibold d-block">GitHub</span>
              <small class="text-secondary">@Json0713</small>
            </div>
          </a>
          <!-- TODO: Replace with your actual email -->
          <a href="mailto:your.email@example.com" class="contact-link d-flex align-items-center gap-3 p-3 rounded-3 text-decoration-none">
            <i class="bi bi-envelope-fill fs-4 text-accent"></i>
            <div>
              <span class="fw-semibold d-block">Email</span>
              <small class="text-secondary">your.email@example.com</small>
            </div>
          </a>
          <div class="contact-link d-flex align-items-center gap-3 p-3 rounded-3">
            <i class="bi bi-geo-alt-fill fs-4 text-accent"></i>
            <div>
              <span class="fw-semibold d-block">Location</span>
              <small class="text-secondary">Philippines</small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
